name: CI

on:
  push:
    branches: [main]
  pull_request:

# Tests that need the multilingual-e5-large ONNX weights (~2.2 GB) — namely
# tests/test_mcp_client.py and tests/test_watch.py — are excluded here. They
# stay valuable as local pre-push checks but are too heavy for hosted runners.
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run lightweight tests
        run: uv run pytest tests/test_indexer.py tests/test_tokenize.py -v
