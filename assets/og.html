<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyBrain MCP — OG image</title>
<style>
  :root {
    --bg-1: #0f1114;
    --bg-2: #080810;
    --fg: #ece6d6;
    --accent: #d4a84f;
    --muted: rgba(236, 230, 214, 0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px; height: 640px;
    background: radial-gradient(circle at 20% 30%, #1a1d23 0%, var(--bg-1) 40%, var(--bg-2) 100%);
    font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    color: var(--fg);
    overflow: hidden;
  }
  .frame {
    width: 1280px; height: 640px;
    display: grid;
    grid-template-columns: 480px 1fr;
    align-items: center;
    padding: 0 64px 0 80px;
    gap: 56px;
    position: relative;
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 32px;
    border: 1px solid rgba(212, 168, 79, 0.18);
    border-radius: 24px;
    pointer-events: none;
  }
  .mark {
    width: 360px; height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mark svg { width: 100%; height: 100%; display: block; }
  .copy { padding-top: 4px; }
  .eyebrow {
    font-size: 18px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
    font-weight: 500;
  }
  h1 {
    font-size: 84px;
    font-weight: 200;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  h1 .strong { font-weight: 600; }
  .tagline {
    font-size: 28px;
    line-height: 1.4;
    color: var(--fg);
    max-width: 640px;
    font-weight: 300;
  }
  .tagline em {
    color: var(--accent);
    font-style: normal;
    font-weight: 500;
  }
  .meta {
    margin-top: 44px;
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 18px;
    color: var(--muted);
    font-family: 'SF Mono', ui-monospace, monospace;
    letter-spacing: 0.05em;
  }
  .meta .pill {
    border: 1px solid rgba(212, 168, 79, 0.4);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="mark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Mnemo">
      <ellipse cx="60" cy="108" rx="28" ry="3" fill="#000" opacity="0.35"/>
      <path d="M 26 112 L 26 74 Q 26 44 60 44 Q 94 44 94 74 L 94 112 Z" fill="#24282f"/>
      <path d="M 26 74 Q 26 44 60 44 Q 94 44 94 74 Z" fill="#2d323b"/>
      <circle cx="60" cy="60" r="13" fill="#ece6d6"/>
      <path d="M 47 60 Q 47 42 60 42 Q 73 42 73 60 Z" fill="#1a1d23"/>
      <g stroke="#d4a84f" stroke-width="1.1" fill="none">
        <circle cx="55" cy="60" r="3.2"/>
        <circle cx="65" cy="60" r="3.2"/>
        <line x1="58.2" y1="60" x2="61.8" y2="60"/>
      </g>
      <g fill="#0f1114">
        <circle cx="55" cy="60" r="0.9"/>
        <circle cx="65" cy="60" r="0.9"/>
      </g>
      <g>
        <rect x="41" y="82" width="38" height="22" rx="2" fill="#8d6d28"/>
        <rect x="41" y="80" width="38" height="22" rx="2" fill="#d4a84f"/>
        <line x1="60" y1="80" x2="60" y2="102" stroke="#0f1114" stroke-width="0.8"/>
        <line x1="43" y1="84" x2="57" y2="84" stroke="#f5e9c3" stroke-width="0.6" opacity="0.8"/>
        <line x1="63" y1="84" x2="77" y2="84" stroke="#f5e9c3" stroke-width="0.6" opacity="0.8"/>
        <line x1="43" y1="88" x2="57" y2="88" stroke="#f5e9c3" stroke-width="0.6" opacity="0.6"/>
        <line x1="63" y1="88" x2="77" y2="88" stroke="#f5e9c3" stroke-width="0.6" opacity="0.6"/>
        <rect x="55" y="80" width="3" height="11" fill="#e85c44"/>
      </g>
    </svg>
  </div>
  <div class="copy">
    <div class="eyebrow">Local-first RAG · MCP server</div>
    <h1>MyBrain<br><span class="strong">MCP</span></h1>
    <p class="tagline">Search your <em>Obsidian vault</em> and your <em>repo's docs</em> in one query — from Claude, Cursor, or any MCP client.</p>
    <div class="meta">
      <span class="pill">MIT</span>
      <span>github.com/0916shokichi-blip/mybrain-mcp</span>
    </div>
  </div>
</div>
</body>
</html>
