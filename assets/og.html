<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bobrain — OG image</title>
<style>
  :root {
    --bg-1: #0f1114;
    --bg-2: #080810;
    --fg: #ece6d6;
    --accent: #d4a84f;
    --muted: rgba(236, 230, 214, 0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px; height: 640px;
    background: radial-gradient(circle at 20% 30%, #1a1d23 0%, var(--bg-1) 40%, var(--bg-2) 100%);
    font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    color: var(--fg);
    overflow: hidden;
  }
  .frame {
    width: 1280px; height: 640px;
    display: grid;
    grid-template-columns: 480px 1fr;
    align-items: center;
    padding: 0 64px 0 80px;
    gap: 56px;
    position: relative;
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 32px;
    border: 1px solid rgba(212, 168, 79, 0.18);
    border-radius: 24px;
    pointer-events: none;
  }
  .mark {
    width: 360px; height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mark svg { width: 100%; height: 100%; display: block; }
  .copy { padding-top: 4px; }
  .eyebrow {
    font-size: 18px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
    font-weight: 500;
  }
  h1 {
    font-size: 84px;
    font-weight: 200;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  h1 .strong { font-weight: 600; }
  .tagline {
    font-size: 28px;
    line-height: 1.4;
    color: var(--fg);
    max-width: 640px;
    font-weight: 300;
  }
  .tagline em {
    color: var(--accent);
    font-style: normal;
    font-weight: 500;
  }
  .meta {
    margin-top: 44px;
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 18px;
    color: var(--muted);
    font-family: 'SF Mono', ui-monospace, monospace;
    letter-spacing: 0.05em;
  }
  .meta .pill {
    border: 1px solid rgba(212, 168, 79, 0.4);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="mark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Bob">
      <ellipse cx="60" cy="108" rx="26" ry="3" fill="#000" opacity="0.35"/>
      <path d="M 30 70 Q 26 60 30 52 Q 26 44 34 40 Q 36 30 46 32 Q 50 26 58 30 Q 60 26 64 30 Q 70 26 74 32 Q 84 30 86 40 Q 94 44 90 52 Q 94 60 90 70 Q 90 80 80 82 L 40 82 Q 30 80 30 70 Z" fill="#d4a48f"/>
      <g stroke="#a07764" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7">
        <path d="M 38 50 Q 46 46 52 52"/>
        <path d="M 56 46 Q 60 50 64 46"/>
        <path d="M 68 52 Q 74 46 82 50"/>
        <path d="M 36 62 Q 46 58 56 64"/>
        <path d="M 64 64 Q 74 58 84 62"/>
        <path d="M 42 74 Q 50 70 58 74"/>
        <path d="M 62 74 Q 70 70 78 74"/>
      </g>
      <path d="M 60 32 Q 58 50 60 76" stroke="#a07764" stroke-width="1.2" fill="none" opacity="0.5"/>
      <g stroke="#d4a84f" stroke-width="1.2" fill="none">
        <circle cx="50" cy="60" r="5"/>
        <circle cx="70" cy="60" r="5"/>
        <line x1="55" y1="60" x2="65" y2="60"/>
        <line x1="45" y1="58" x2="42" y2="56"/>
        <line x1="75" y1="58" x2="78" y2="56"/>
      </g>
      <g fill="#0f1114">
        <circle cx="50" cy="60" r="1.6"/>
        <circle cx="70" cy="60" r="1.6"/>
      </g>
      <g>
        <rect x="40" y="86" width="40" height="18" rx="2" fill="#8d6d28"/>
        <rect x="40" y="84" width="40" height="18" rx="2" fill="#d4a84f"/>
        <line x1="60" y1="84" x2="60" y2="102" stroke="#0f1114" stroke-width="0.8"/>
        <line x1="42" y1="89" x2="56" y2="89" stroke="#f5e9c3" stroke-width="0.6" opacity="0.8"/>
        <line x1="64" y1="89" x2="78" y2="89" stroke="#f5e9c3" stroke-width="0.6" opacity="0.8"/>
        <line x1="42" y1="93" x2="56" y2="93" stroke="#f5e9c3" stroke-width="0.6" opacity="0.6"/>
        <line x1="64" y1="93" x2="78" y2="93" stroke="#f5e9c3" stroke-width="0.6" opacity="0.6"/>
        <rect x="55" y="84" width="3" height="11" fill="#e85c44"/>
      </g>
    </svg>
  </div>
  <div class="copy">
    <div class="eyebrow">Local-first RAG · MCP server</div>
    <h1><span class="strong">Bobrain</span></h1>
    <p class="tagline">Search your <em>Obsidian vault</em> and your <em>repo's docs</em> in one query — from Claude, Cursor, or any MCP client.</p>
    <div class="meta">
      <span class="pill">MIT</span>
      <span>github.com/0916shokichi-blip/bobrain</span>
    </div>
  </div>
</div>
</body>
</html>
